<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تواصل معنا – AutoDrop Platform</title>
  <style>
    body { font-family: Tahoma, Arial, sans-serif; background: linear-gradient(130deg, #f5faff 70%, #ecf0ff 100%); margin: 0; padding: 0; color: #222;}
    header { background: #0038ff; color: white; padding: 35px 10px 20px 10px; text-align: center;}
    section { max-width: 520px; margin: 35px auto; background: #fff; border-radius: 18px; box-shadow: 0 2px 24px #0038ff18; padding: 28px;}
    h1 { color: #0038ff;}
    .field { margin-bottom: 16px;}
    .field label { display:block; margin-bottom:4px;}
    .field input, .field textarea { width: 100%; padding:10px; border-radius:7px; border:1px solid #ddd; font-size:1em;}
    .btn-main { background: #0038ff; color: #fff; padding: 12px 27px; border-radius: 24px; border:0; font-size: 1em; font-weight:bold; margin:12px 0 0 0; cursor:pointer; transition:.2s;}
    .btn-main:hover {background:#002acc;}
    .socials {margin:30px 0 0 0; text-align:center;}
    .socials a {display:inline-block; margin:0 10px;}
    .socials img {width:35px; vertical-align:middle;}
    .contact-box {margin:15px 0; background:#f5f8ff; padding:10px 18px; border-radius:8px; font-size:1.05em;}
    @media (max-width:600px){
      section {padding: 10px;}
      .socials img {width:28px;}
    }
  </style>
</head>
<body>
  <header>
    <h1>تواصل معنا</h1>
    <p>نسعد باستفسارك أو اقتراحاتك في أي وقت</p>
  </header>

  <section>
    <form action="mailto:skwreckerservce@gmail.com" method="POST" enctype="text/plain">
      <div class="field">
        <label>اسمك</label>
        <input type="text" name="name" required>
      </div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" name="email" required>
      </div>
      <div class="field">
        <label>رسالتك</label>
        <textarea name="message" rows="5" required></textarea>
      </div>
      <button class="btn-main" type="submit">إرسال الرسالة</button>
    </form>

    <div class="contact-box">
      <b>أو تواصل مباشرة:</b><br>
      البريد: <a href="mailto:skwreckerservce@gmail.com">skwreckerservce@gmail.com</a><br>
      الواتساب: <a href="https://wa.me/966500000000" target="_blank">اضغط هنا للدردشة</a>
    </div>

    <div class="socials">
      <a href="https://instagram.com/autodropplatform" target="_blank" title="انستقرام">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram" />
      </a>
      <a href="https://tiktok.com/@autodropplatform" target="_blank" title="تيك توك">
        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046120.png" alt="TikTok" />
      </a>
      <a href="https://facebook.com/autodropplatform" target="_blank" title="فيسبوك">
        <img src="https://cdn-icons-png.flaticon.com/512/145/145802.png" alt="Facebook" />
      </a>
    </div>
  </section>
</body>
</html>
