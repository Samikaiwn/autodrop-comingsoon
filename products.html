<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>منتجاتنا – AutoDrop Platform</title>
  <style>
    body { font-family: Tahoma, Arial, sans-serif; background: #f5faff; margin: 0; padding: 0; color: #222;}
    nav { background:#0038ff; padding:12px 0; }
    nav div { max-width:1050px; margin:0 auto; display:flex; justify-content:center; gap:17px; flex-wrap:wrap;}
    nav a { color:#fff; text-decoration:none; font-weight: bold; }
    nav a.active { text-decoration: underline;}
    .products { display:flex;gap:24px;flex-wrap:wrap;justify-content:center;margin:32px 0;}
    .card { background:#fff; border-radius:13px; padding:18px; width:240px; text-align:center; margin-bottom:20px; box-shadow:0 2px 14px #0038ff18;}
    .card img { width:90%; border-radius:12px; height:130px; object-fit:cover;}
    .card .title {margin:12px 0 7px;font-weight:bold;font-size:1.08em;}
    .card .price {color:#0038ff;font-size:1.05em;}
    .buy-btn {display:inline-block;margin-top:8px;padding:8px 16px;background:#0038ff;color:#fff;border-radius:14px;text-decoration:none;font-weight:bold;}
    .desc {font-size:0.97em;margin-top:9px; color:#222;}
    footer { background:#0038ff; color:#fff; padding:16px 0; margin-top:30px; text-align:center; font-size:15px;}
    @media (max-width:800px){.products{flex-direction:column;align-items:center;}.card{width:90%;}}
    @media (max-width:600px){nav div{gap:10px;}.card img{height:85px;}}
  </style>
</head>
<body>
<nav>
  <div>
    <a href="index.html">الرئيسية</a>
    <a href="about.html">عن المنصة</a>
    <a href="products.html" class="active">منتجاتنا</a>
    <a href="faq.html">الأسئلة الشائعة</a>
    <a href="contact.html">تواصل معنا</a>
    <a href="terms.html">الشروط والأحكام</a>
    <a href="privacy.html">سياسة الخصوصية</a>
  </div>
</nav>

<div style="max-width:1100px;margin:20px auto 30px;">
  <h1 style="color:#0038ff;text-align:center;">منتجاتنا</h1>
  <div class="products" id="products"></div>
</div>

<footer>
  جميع الحقوق محفوظة &copy; AutoDrop Platform 2025
</footer>

<script>
// بيانات المنتجات مع الأسعار بالدولار
const products = [
  {
    "img": "https://s.alicdn.com/@sc04/kf/H5b9b0c8f6fd74e80a6f4bb415e73359bf.jpg_300x300.jpg",
    "title": "سماعة بلوتوث ذكية",
    "price": "$18",
    "link": "https://wa.me/966500000000?text=أريد طلب سماعة بلوتوث ذكية من AutoDrop",
    "desc": "سماعة عالية الجودة تدعم جميع الأجهزة الذكية. شحن سريع وصوت نقي."
  },
  {
    "img": "https://s.alicdn.com/@sc04/kf/Hfbda3ef95a5245a9b6b5cf8ad3a1e6d3e.jpg_300x300.jpg",
    "title": "باور بنك بسعة 20000mAh",
    "price": "$29",
    "link": "https://wa.me/966500000000?text=أريد طلب باور بنك 20000 من AutoDrop",
    "desc": "شحن سريع ومتين لجميع الأجهزة، تصميم أنيق وعصري."
  },
  {
    "img": "https://s.alicdn.com/@sc04/kf/Hd5e8fb5ea2ca4c1fbaeba8af6b7e1aabx.jpg_300x300.jpg",
    "title": "ساعة ذكية مقاومة للماء",
    "price": "$32",
    "link": "https://wa.me/966500000000?text=أريد طلب ساعة ذكية مقاومة للماء من AutoDrop",
    "desc": "شاشة لمس ملونة، تدعم البلوتوث، متابعة نبضات القلب والنوم."
  }
];

function renderProducts() {
  let html = "";
  products.forEach(prod => {
    html += `
      <div class="card">
        <img src="${prod.img}" alt="${prod.title}">
        <div class="title">${prod.title}</div>
        <div class="price">${prod.price}</div>
        <a href="${prod.link}" class="buy-btn" target="_blank">اطلب عبر واتساب</a>
        <div class="desc">${prod.desc}</div>
      </div>
    `;
  });
  document.getElementById("products").innerHTML = html;
}
renderProducts();
</script>
</body>
</html>
