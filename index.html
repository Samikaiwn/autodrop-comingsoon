<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AutoDrop Platform - الصفحة الرئيسية</title>
  <style>
    body { font-family: Tahoma, Arial, sans-serif; background: linear-gradient(120deg, #f7faff 80%, #ecf0ff 100%); margin: 0; padding: 0; color: #222;}
    nav { background:#0038ff; padding:12px 0; }
    nav div { max-width:1050px; margin:0 auto; display:flex; justify-content:center; gap:17px; flex-wrap:wrap;}
    nav a { color:#fff; text-decoration:none; font-weight: bold; transition:.2s;}
    nav a.active, nav a:hover { text-decoration: underline;}
    .container { max-width:650px; margin:50px auto 0; background:#fff; border-radius:18px; box-shadow:0 2px 18px #0038ff18; padding:40px 25px 30px;}
    .main-logo {display:block; margin:0 auto 14px; width:110px;}
    .main-title {text-align:center; font-size:2.1em; font-weight:bold; color:#0038ff; margin-bottom:18px;}
    .thanks {text-align:center; font-size:1.24em; color:#444;}
    .thanks span {display:block; color:#0038ff; font-size:1.18em; margin-top:7px;}
    .welcome-messages { margin:38px auto 12px; min-height:45px; text-align:center;}
    .msg-anim { display:inline-block; font-size:1.12em; color:#0038ff; font-weight:bold; transition:.5s;}
    footer { background:#0038ff; color:#fff; padding:18px 0 10px; margin-top:35px; text-align:center; font-size:15px; border-radius:0 0 12px 12px;}
    @media (max-width:700px){.container{padding:18px 3px;}.main-title{font-size:1.3em;}}
  </style>
</head>
<body>
<nav>
  <div>
    <a href="index.html" class="active">الرئيسية</a>
    <a href="about.html">عن المنصة</a>
    <a href="products.html">منتجاتنا</a>
    <a href="faq.html">الأسئلة الشائعة</a>
    <a href="contact.html">تواصل معنا</a>
    <a href="terms.html">الشروط والأحكام</a>
  </div>
</nav>

<div class="container">
  <img src="autodrop-logo.png" alt="AutoDrop Logo" class="main-logo">
  <div class="main-title">AutoDrop Platform</div>
  <div class="thanks">
    هذا من فضل ربي
    <span>This is by the grace of my Lord</span>
  </div>

  <div class="welcome-messages">
    <span class="msg-anim" id="welcomeMsg"></span>
  </div>
</div>

<footer>
  <div>جميع الحقوق محفوظة &copy; 2025 AutoDrop Platform – متجر عالمي لجميع دول العالم</div>
</footer>

<script>
  // رسائل ترحيبية متحركة
  const msgs = [
    "مرحباً بكم في منصتكم الموثوقة لتسوق عالمي ذكي وآمن!",
    "ابدأ تجربتك مع منتجات عالية الجودة وخدمة عملاء فريدة.",
    "دعم كامل لأصحاب المشاريع الصغيرة والتجار.",
    "شحن سريع وآمن لجميع الدول."
  ];
  let i=0;
  function showMsg(){
    document.getElementById("welcomeMsg").textContent = msgs[i];
    i = (i+1) % msgs.length;
    setTimeout(showMsg, 3000);
  }
  showMsg();
</script>
</body>
</html>
