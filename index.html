<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>الرئيسية – AutoDrop Platform</title>

  <meta name="description" content="AutoDrop Platform – منصة تسوق إلكترونية عالمية تقدم منتجات متنوعة من أفضل الموردين حول العالم. توصيل دولي سريع ودعم فوري.">
  <meta name="keywords" content="AutoDrop, autodropplatform, متجر الكتروني, تسوق عالمي, منتجات دولية, توصيل دولي, متجر للجميع">
  <meta name="author" content="AutoDrop Platform Team">
  <meta property="og:title" content="AutoDrop Platform – منصة تسوق عالمية">
  <meta property="og:description" content="منصة إلكترونية تتيح لك التسوق من جميع أنحاء العالم وشحن دولي سريع. اكتشف أفضل المنتجات والعروض الآن.">

  <meta name="robots" content="index,follow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body { font-family: Tahoma, Arial, sans-serif; background: #f7faff; margin: 0; padding: 0; color: #222;}
    .center { text-align: center; margin-top: 70px; }
    .main-title { color: #0038ff; font-size: 2em; }
    .desc { margin-top: 25px; font-size: 1.3em; }
    .logo-box { margin-top: 32px;}
    .logo-box img { width: 110px; display: block; margin: 0 auto 8px;}
    .logo-name { color:#0038ff; font-size:1.18em;font-weight:bold;letter-spacing:1px;margin-top:3px;}
    footer { background: #0038ff; color: #fff; padding:16px 0; margin-top:55px; text-align:center; font-size:15px;}
    @media (max-width:600px){.main-title{font-size:1.2em;}.desc{font-size:1em;}.logo-box img{width:75px;}}

<body>
  <div class="center">

      <img src="https://api.iconify.design/material-symbols/local-shipping-outline.svg?color=%230038ff&width=110" alt="AutoDrop Logo">

  <footer>
    جميع الحقوق محفوظة &copy; AutoDrop Platform 2025 – متجر عالمي يخدم جميع العملاء في كل الدول 🌍

</html>
