<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | AutoDrop Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background:#f6faff; font-family:Arial,sans-serif; }
    .container { max-width:420px; margin:60px auto; background:#fff; border-radius:12px; box-shadow:0 2px 24px #0074e422; padding:34px 26px;}
    h1 { color:#0074e4;}
    label { display:block; margin:18px 0 5px 0; font-weight:600;}
    input, select { width:100%; padding:11px 8px; margin-bottom:10px; border:1px solid #c0d6e4; border-radius:7px;}
    button { background:#0074e4; color:#fff; border:none; border-radius:7px; font-size:1.05rem; padding:12px 0; width:100%; margin-top:10px;}
    button:hover { background:#005bb5;}
  </style>
</head>
<body>
  <div class="container">
    <h1>Seller Registration</h1>
    <form>
      <label>Name</label>
      <input type="text" placeholder="Your Name" required>
      <label>Email</label>
      <input type="email" placeholder="Your Email" required>
      <label>Business Type</label>
      <select>
        <option>Small Business</option>
        <option>Supplier</option>
        <option>Individual</option>
      </select>
      <label>Product Type</label>
      <input type="text" placeholder="What do you sell?" required>
      <button type="submit" onclick="alert('Registration submitted!')">Register</button>
    </form>
  </div>
</body>
</html>
