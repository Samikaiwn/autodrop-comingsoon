<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seller Registration - AutoDrop Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background: #f7faff; font-family: Arial, sans-serif; margin: 0; }
    .container { max-width: 480px; background: #fff; margin: 50px auto; padding: 35px 22px; border-radius: 14px; box-shadow: 0 0 20px #e3f1ff; }
    h2 { color: #0073e6; margin-bottom: 12px; }
    form { display: flex; flex-direction: column; }
    label { margin: 10px 0 4px; color: #444; font-size: 15px; }
    input, textarea { padding: 11px; border-radius: 7px; border: 1px solid #b8daff; margin-bottom: 13px; font-size: 16px; }
    button { background: #0073e6; color: #fff; border: none; border-radius: 7px; padding: 13px; font-weight: bold; font-size: 16px; cursor: pointer; }
    button:hover { background: #005bb5; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Register as Seller</h2>
    <form>
      <label for="storeName">Store Name</label>
      <input type="text" id="storeName" name="storeName" required>

      <label for="fullName">Your Name</label>
      <input type="text" id="fullName" name="fullName" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Phone Number</label>
      <input type="text" id="phone" name="phone" required>

      <label for="description">Store Description</label>
      <textarea id="description" name="description" rows="3" required></textarea>

      <button type="submit">Submit Registration</button>
    </form>
  </div>
</body>
</html>
